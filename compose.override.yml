# compose.override.yml — Development overrides (auto-merged by docker compose up)

services:
  app:
    build:
      context: .
      target: development
    volumes:
      - .:/app
      - /app/vendor
      - /app/node_modules
    ports:
      - "${APP_PORT:-8000}:8000"
      - "9003:9003"                       # Xdebug port
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      LOG_LEVEL: debug
      XDEBUG_MODE: develop,debug
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]

  horizon:
    build:
      target: development
    volumes:
      - .:/app
      - /app/vendor

  scheduler:
    build:
      target: development
    volumes:
      - .:/app
      - /app/vendor

  reverb:
    build:
      target: development
    volumes:
      - .:/app
      - /app/vendor
    ports:
      - "${REVERB_PORT:-8080}:8080"

  db:
    ports:
      - "${DB_PORT:-3306}:3306"           # Expose for local DB tools

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"        # Expose for local tools

  nginx:
    ports:
      - "${HTTP_PORT:-80}:80"

  # --- Dev-only services ---

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"                        # Web UI
      - "1025:1025"                        # SMTP
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025/readyz"]
      interval: 15s
      timeout: 5s
      retries: 2
      start_period: 5s
    networks:
      - backend
    profiles: [dev]
