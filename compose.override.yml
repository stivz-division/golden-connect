# compose.override.yml — Development overrides (auto-merged by docker compose up)

services:
  app:
    volumes:
      - .:/app
      - vendor_data:/app/vendor
      - node_modules_data:/app/node_modules
    ports:
      - "${APP_PORT:-8000}:8000"
      - "9003:9003"                       # Xdebug port
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      LOG_LEVEL: debug
      XDEBUG_MODE: develop,debug
    command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
    healthcheck:
      test: ["CMD-SHELL", "php -r 'file_get_contents(\"http://localhost:8000\");' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s

  horizon:
    volumes:
      - .:/app
      - vendor_data:/app/vendor
    environment:
      INSTALL_NODE_DEPS: "false"

  scheduler:
    volumes:
      - .:/app
      - vendor_data:/app/vendor
    environment:
      INSTALL_NODE_DEPS: "false"

  reverb:
    volumes:
      - .:/app
      - vendor_data:/app/vendor
    ports:
      - "${REVERB_PORT:-8080}:8080"
    environment:
      INSTALL_NODE_DEPS: "false"

  db:
    ports:
      - "${DB_PORT:-3306}:3306"           # Expose for local DB tools

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"        # Expose for local tools

  # --- Dev-only services ---

  vite:
    build:
      context: .
      target: development
    volumes:
      - .:/app
      - node_modules_data:/app/node_modules
    ports:
      - "5173:5173"
    command: ["npx", "vite", "--host"]
    environment:
      INSTALL_NODE_DEPS: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5173 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"                        # Web UI
      - "1025:1025"                        # SMTP
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025/readyz"]
      interval: 15s
      timeout: 5s
      retries: 2
      start_period: 5s
    networks:
      - backend
    profiles: [dev]

volumes:
  vendor_data:
  node_modules_data:
