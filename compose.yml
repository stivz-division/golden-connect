# compose.yml — Base configuration for development
# Usage: docker compose up (auto-merges compose.override.yml)

name: ${COMPOSE_PROJECT_NAME:-golden-connect}

services:
  app:
    build:
      context: .
      target: development
      args:
        VITE_APP_NAME: ${APP_NAME:-GoldenConnect}
        VITE_REVERB_APP_KEY: ${REVERB_APP_KEY:-golden-connect-key}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST:-localhost}
        VITE_REVERB_PORT: ${HTTP_PORT:-80}
        VITE_REVERB_SCHEME: ${REVERB_SCHEME:-http}
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -r 'file_get_contents(\"http://localhost:8000\");' 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - backend

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-golden_connect}
      MYSQL_USER: ${DB_USERNAME:-app}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - backend

  horizon:
    build:
      context: .
      target: development
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: ["php", "artisan", "horizon"]
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "artisan", "horizon:status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend

  scheduler:
    build:
      context: .
      target: development
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: ["php", "artisan", "schedule:work"]
    healthcheck:
      disable: true
    depends_on:
      app:
        condition: service_healthy
    networks:
      - backend

  reverb:
    build:
      context: .
      target: development
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "@fsockopen('localhost', 8080) or exit(1);"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - backend

volumes:
  mysql_data:
  redis_data:

networks:
  backend:
    driver: bridge
