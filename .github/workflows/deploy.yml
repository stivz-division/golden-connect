name: Deploy

on:
  workflow_run:
    workflows: [Tests, Lint, Build]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev-$(git rev-parse --short HEAD)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ steps.version.outputs.sha_short }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd ${{ secrets.SERVER_PROJECT_PATH }}

            # Pull latest code
            git pull origin main

            # Pull new image
            docker compose -f compose.yml -f compose.production.yml pull app

            # Run migrations
            docker compose -f compose.yml -f compose.production.yml run --rm app php artisan migrate --force

            # Rolling restart
            docker compose -f compose.yml -f compose.production.yml up -d --force-recreate --no-deps app horizon scheduler reverb

            # Wait for health check
            echo "Waiting for health check..."
            for i in $(seq 1 60); do
              HEALTH=$(docker compose -f compose.yml -f compose.production.yml ps --format '{{.Health}}' app 2>/dev/null || echo "starting")
              if [ "$HEALTH" = "healthy" ]; then
                echo "Application is healthy!"
                exit 0
              fi
              sleep 1
            done
            echo "Health check failed!"
            docker compose -f compose.yml -f compose.production.yml logs --tail=30 app
            exit 1

      - name: Notify on failure
        if: failure()
        run: echo "::error::Deployment failed! Check the logs above."
