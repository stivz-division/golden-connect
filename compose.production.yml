# compose.production.yml — Production hardening
# Local test: docker compose -f compose.yml -f compose.production.yml up -d
# Real prod: set DOCKER_REGISTRY/DOCKER_IMAGE in .env and use prebuilt images

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "5"

x-security: &default-security
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  app:
    build:
      context: .
      target: production
    <<: *default-security
    read_only: false
    user: "1001:1001"
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
          pids: 200
        reservations:
          cpus: "0.5"
          memory: 256M
    logging: *default-logging
    restart: unless-stopped

  horizon:
    build:
      context: .
      target: production
    <<: *default-security
    read_only: false
    user: "1001:1001"
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
          pids: 200
        reservations:
          cpus: "0.25"
          memory: 256M
    logging: *default-logging
    restart: unless-stopped

  scheduler:
    build:
      context: .
      target: production
    <<: *default-security
    read_only: false
    user: "1001:1001"
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
          pids: 50
        reservations:
          cpus: "0.1"
          memory: 64M
    logging: *default-logging
    restart: unless-stopped

  reverb:
    build:
      context: .
      target: production
    <<: *default-security
    read_only: false
    user: "1001:1001"
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
          pids: 100
        reservations:
          cpus: "0.25"
          memory: 128M
    logging: *default-logging
    restart: unless-stopped

  db:
    <<: *default-security
    read_only: false
    cap_add:
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging: *default-logging
    restart: unless-stopped

  redis:
    <<: *default-security
    read_only: false
    cap_add:
      - DAC_OVERRIDE
      - SETGID
      - SETUID
      - CHOWN
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging: *default-logging
    restart: unless-stopped

  nginx:
    <<: *default-security
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
      - /var/cache/nginx:noexec,nosuid,size=50m
      - /var/run:noexec,nosuid,size=10m
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging: *default-logging
    restart: unless-stopped

networks:
  backend:
    internal: true
